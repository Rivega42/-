# Alembic configuration for BookCabinet.
# The actual SQLite URL is resolved at runtime from DATABASE_PATH
# (see bookcabinet/migrations/env.py) so we leave sqlalchemy.url blank here.

[alembic]
script_location = bookcabinet/migrations
prepend_sys_path = .
sqlalchemy.url =

# Use a single-line file template for version files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for file_template timestamps.
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
