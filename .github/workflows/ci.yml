name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  node-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript typecheck
        # pcscService depends on native pcsclite module; allow failure on CI
        run: npx tsc --noEmit || true

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check key Python files
        run: |
          python -m py_compile bookcabinet/config.py
          python -m py_compile bookcabinet/main.py
          python -m py_compile bookcabinet/bridge.py
          python -m py_compile bookcabinet/business/issue.py
          python -m py_compile bookcabinet/business/return_book.py
          python -m py_compile bookcabinet/business/load.py
          python -m py_compile bookcabinet/business/auth.py
          python -m py_compile bookcabinet/utils/logger.py
