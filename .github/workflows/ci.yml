name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  node-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint JS/TS
        # Lint is advisory for now — keep the pipeline green while we clean up warnings.
        run: npx eslint client/ server/ --ext .ts,.tsx --max-warnings 50 || echo "Lint warnings present"
      - name: TypeScript typecheck
        # Critical: tsc must pass.
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install ruff pytest
      - name: Ruff check
        # Advisory lint — relaxed rule set while the codebase is being cleaned up.
        run: ruff check bookcabinet/ tools/ --ignore E501,E402,F401 || echo "Ruff warnings"
      - name: Syntax check
        # Critical: every .py file must at least compile.
        run: find bookcabinet tools -name "*.py" -exec python -m py_compile {} +
