name: CI (legacy — superseded by ci-pr.yml)

# Triggers disabled — этот workflow заменён на ci-pr.yml в ШАГЕ 7 repo-setup.
# Оставлен в репо как fallback / reference. Ручной запуск возможен через workflow_dispatch.
on:
  workflow_dispatch:

jobs:
  node-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript typecheck
        shell: bash {0}
        run: |
          npx tsc --noEmit > /tmp/tsc.log 2>&1
          REAL=$(grep 'error TS' /tmp/tsc.log | grep -cv 'pcscService')
          echo "TypeScript errors (excluding pcscService): $REAL"
          if [ "$REAL" -gt 0 ]; then
            grep 'error TS' /tmp/tsc.log | grep -v 'pcscService'
            exit 1
          fi

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: find bookcabinet tools -name "*.py" -exec python -m py_compile {} +
